# Docker Compose para servicios locales — Contable PMS
# Uso: docker-compose up -d
#
# PostgreSQL:
# - Host: localhost
# - Puerto: 5534
# - Usuario: postgres
# - Password: postgres
# - Base de datos: contable_pms
#
# MinIO (solo si STORAGE_PROVIDER=s3):
# - API S3: http://localhost:9004
# - Console: http://localhost:9005
# - Usuario: minioadmin
# - Password: minioadmin123
#
# Para levantar solo PostgreSQL:
#   docker-compose up -d db
#
# Para levantar PostgreSQL + MinIO:
#   docker-compose --profile storage up -d
# Para Bajar:
#   docker-compose --profile storage down

name: contable-pms

services:
  db:
    image: postgres:16-alpine
    container_name: contable-pms-db
    restart: "no"
    ports:
      - '5534:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-contable_pms}
    volumes:
      - contable_pms_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: contable-pms-minio
    profiles:
      - storage
    restart: "no"
    ports:
      - '9004:9000'   # API S3
      - '9005:9001'   # Console Web
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - contable_pms_minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: contable-pms-minio-init
    profiles:
      - storage
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb myminio/$${S3_BUCKET:-contable} --ignore-existing;
      mc anonymous set download myminio/$${S3_BUCKET:-contable}/public;
      echo 'Bucket created successfully';
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      S3_BUCKET: ${S3_BUCKET:-contable}

volumes:
  contable_pms_data:
  contable_pms_minio:
